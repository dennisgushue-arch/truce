name: Web CI

'on':
  push:
    paths:
      - 'truce/**'
      - '.github/workflows/web-ci.yml'
  pull_request:
    paths:
      - 'truce/**'
      - '.github/workflows/web-ci.yml'

jobs:
  web-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: truce

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: truce/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format

      - name: Build
        run: npm run build
